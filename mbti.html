<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI тест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="mbti.html">MBTI</a>
            <a href="attachment.html">Привязанность</a>
            <a href="temperament.html">Темперамент</a>
            <a href="eq-test.html">EQ</a>
            <a href="burnout-test.html">Выгорание</a>
            <a href="profile.html">📊 Мои результаты</a>
        </nav>
    </header>
    <main>
        <h1>🔍 Тест на тип личности (MBTI)</h1>
        <div id="quiz-area"></div>
        <div id="result-area" class="result-area" style="display: none;"></div>
    </main>
    <footer><p>Учебный проект для колледжа © 2025</p></footer>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Тёмная тема</button>

    <script src="google-sheet.js"></script>
    <script>
        const questions = [
            { text: "После долгой работы в компании вы чувствуете прилив энергии.", scale: "ei", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" },
            { text: "Вы предпочитаете работать в тишине и одиночестве.", scale: "ei", leftVal: 1, rightVal: 0, leftText: "Верно", rightText: "Не верно" },
            { text: "Вы любите быть в центре внимания на вечеринках.", scale: "ei", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" },
            { text: "После активного общения вам нужно время побыть одному.", scale: "ei", leftVal: 1, rightVal: 0, leftText: "Верно", rightText: "Не верно" },
            { text: "Вы легко заводите новые знакомства.", scale: "ei", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" },
            { text: "Вы больше доверяете фактам, чем интуиции.", scale: "sn", leftVal: 0, rightVal: 1, leftText: "Факты", rightText: "Интуиция" },
            { text: "Вам нравится искать скрытый смысл в событиях.", scale: "sn", leftVal: 1, rightVal: 0, leftText: "Факты", rightText: "Интуиция" },
            { text: "Вы практичны и реалистичны.", scale: "sn", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" },
            { text: "Вам интересны теории и возможности, даже если они не применимы сейчас.", scale: "sn", leftVal: 1, rightVal: 0, leftText: "Верно", rightText: "Не верно" },
            { text: "Вы замечаете детали и конкретику.", scale: "sn", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" },
            { text: "Принимая решение, вы опираетесь на логику.", scale: "tf", leftVal: 0, rightVal: 1, leftText: "Логика", rightText: "Чувства" },
            { text: "Для вас важнее гармония в отношениях, чем объективная истина.", scale: "tf", leftVal: 1, rightVal: 0, leftText: "Логика", rightText: "Чувства" },
            { text: "Вы считаете себя справедливым и принципиальным человеком.", scale: "tf", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" },
            { text: "Вы часто жертвуете своими интересами ради других.", scale: "tf", leftVal: 1, rightVal: 0, leftText: "Верно", rightText: "Не верно" },
            { text: "В споре вы защищаете факты, а не чувства собеседника.", scale: "tf", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" },
            { text: "Вы любите планировать и соблюдать расписание.", scale: "jp", leftVal: 0, rightVal: 1, leftText: "Планирую", rightText: "Импровизирую" },
            { text: "Вам комфортнее действовать без жёсткого плана.", scale: "jp", leftVal: 1, rightVal: 0, leftText: "Планирую", rightText: "Импровизирую" },
            { text: "Вы всегда доводите начатое до конца до дедлайна.", scale: "jp", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" },
            { text: "Вам нравится спонтанность и открытость новому.", scale: "jp", leftVal: 1, rightVal: 0, leftText: "Верно", rightText: "Не верно" },
            { text: "Вы предпочитаете иметь чёткий порядок на рабочем столе.", scale: "jp", leftVal: 0, rightVal: 1, leftText: "Верно", rightText: "Не верно" }
        ];

        let currentIndex = 0;
        let answers = [];

        const typeDescriptions = {
            "INTJ": "Стратег, архитектор. Вы обладаете аналитическим складом ума, видите системы и закономерности.",
            "INTP": "Учёный, мыслитель. Вы любознательны, обожаете анализировать теории.",
            "ENTJ": "Командир, лидер. Вы решительны, амбициозны и умеете организовать любую деятельность.",
            "ENTP": "Изобретатель, новатор. Вы генерируете множество идей, любите мозговые штурмы.",
            "INFJ": "Советчик, провидец. Вы чутко чувствуете эмоции других, стремитесь помогать людям.",
            "INFP": "Идеалист, миротворец. Вы глубоко цените гармонию и свои внутренние ценности.",
            "ENFJ": "Учитель, наставник. Вы харизматичны, умеете вдохновлять и мотивировать людей.",
            "ENFP": "Борец, активист. Вы полны энтузиазма, креативны и открыты новым возможностям.",
            "ISTJ": "Инспектор, логист. Вы ответственны, практичны и надёжны.",
            "ISFJ": "Хранитель, защитник. Вы заботливы, терпеливы и преданны.",
            "ESTJ": "Управляющий, администратор. Вы энергичны, прямолинейны и практичны.",
            "ESFJ": "Консул, энтузиаст. Вы дружелюбны, общительны и очень ответственны.",
            "ISTP": "Мастер, виртуоз. Вы спокойны, независимы и практичны.",
            "ISFP": "Художник, исследователь. Вы чувствительны, скромны и обладаете тонким вкусом.",
            "ESTP": "Делец, предприниматель. Вы энергичны, смелы и практичны.",
            "ESFP": "Аниматор, исполнитель. Вы жизнерадостны, спонтанны и обожаете быть в центре внимания."
        };

        function renderQuestion() {
            if (currentIndex >= questions.length) {
                showResult();
                return;
            }
            const q = questions[currentIndex];
            let html = `<div class="question-card">
                <strong>${currentIndex+1}. ${q.text}</strong>
                <div class="options-row">
                    <div class="opt-btn" data-val="${q.leftVal}">${q.leftText}</div>
                    <div class="opt-btn" data-val="${q.rightVal}">${q.rightText}</div>
                </div>
            </div>`;
            document.getElementById("quiz-area").innerHTML = html;

            document.querySelectorAll(".opt-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    answers.push(parseInt(btn.dataset.val));
                    currentIndex++;
                    renderQuestion();
                });
            });
        }

        function calculateType() {
            let sumEI = 0, sumSN = 0, sumTF = 0, sumJP = 0;
            for (let i = 0; i < answers.length; i++) {
                const scale = questions[i].scale;
                const val = answers[i];
                if (scale === "ei") sumEI += val;
                if (scale === "sn") sumSN += val;
                if (scale === "tf") sumTF += val;
                if (scale === "jp") sumJP += val;
            }
            return (sumEI > 2.5 ? "I" : "E") + (sumSN > 2.5 ? "N" : "S") + (sumTF > 2.5 ? "F" : "T") + (sumJP > 2.5 ? "P" : "J");
        }

        function showResult() {
            const type = calculateType();
            const desc = typeDescriptions[type] || "Изучайте себя глубже!";
            
            localStorage.setItem('lastMBTI', type);
            localStorage.setItem('lastMBTIdesc', desc);
            
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) {
                if (!user.results) user.results = {};
                user.results.mbti = type;
                user.results.mbtiDesc = desc;
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // Отправка в Google Sheets
                if (typeof sendTestResult === 'function') {
                    sendTestResult(user.name, user.age, user.gender, "MBTI (16 типов)", type, desc);
                }
            }
            
            document.getElementById("quiz-area").style.display = "none";
            document.getElementById("result-area").style.display = "block";
            document.getElementById("result-area").innerHTML = `
                <div class="type-name">Ваш тип: ${type}</div>
                <p>${desc}</p>
                <p><small>✅ Результат сохранён в вашем профиле и отправлен в Google Таблицу.</small></p>
                <button onclick="location.reload()">Пройти заново</button>
                <a href="index.html" class="button" style="margin-left: 1rem;">🏠 На главную</a>
            `;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️ Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.textContent = '🌓 Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️ Светлая тема';
        }

        renderQuestion();
    </script>
</body>
</html>
