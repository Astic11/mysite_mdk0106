<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои результаты</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .results-grid { display: flex; flex-direction: column; gap: 1rem; }
        .result-card { background: var(--card-bg-solid); border-radius: 20px; padding: 1rem; border-left: 5px solid #667eea; }
        .result-card h3 { margin-bottom: 0.5rem; color: #667eea; }
        .no-results { text-align: center; padding: 2rem; color: #888; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="mbti.html">MBTI</a>
            <a href="attachment.html">Привязанность</a>
            <a href="temperament.html">Темперамент</a>
            <a href="eq-test.html">EQ</a>
            <a href="burnout-test.html">Выгорание</a>
            <a href="profile.html">📊 Мои результаты</a>
        </nav>
    </header>
    <main>
        <h1>📊 Мои результаты</h1>
        <div id="userInfoBlock" style="background: var(--card-bg-solid); border-radius: 20px; padding: 1rem; margin-bottom: 2rem; text-align: center;"></div>
        <div id="resultsContainer" class="results-grid"></div>
        <div style="text-align: center; margin-top: 2rem;">
            <a href="index.html" class="button">← Вернуться к тестам</a>
            <button onclick="downloadMyData()" style="background: #27ae60; margin-left: 1rem;">📥 Скачать мои данные</button>
        </div>
    </main>
    <footer><p>Учебный проект для колледжа © 2025</p></footer>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Тёмная тема</button>

    <script>
        function loadProfile() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const isRegistered = localStorage.getItem('isRegistered');
            
            if (!isRegistered || !user) {
                window.location.href = 'register.html';
                return;
            }
            
            document.getElementById('userInfoBlock').innerHTML = `
                <strong>👤 ${user.name}</strong>, ${user.age} лет ${user.gender ? '· ' + user.gender : ''}<br>
                <small>Зарегистрирован: ${user.registeredAt}</small>
            `;
            
            const results = user.results || {};
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            const tests = [
                { name: "MBTI", key: "mbti", value: results.mbti, desc: results.mbtiDesc },
                { name: "Стиль привязанности", key: "attachment", value: results.attachment, desc: results.attachmentDesc },
                { name: "Темперамент", key: "temperament", value: results.temperament, desc: results.temperamentDesc },
                { name: "EQ", key: "eq", value: results.eq, desc: results.eqDesc },
                { name: "Выгорание", key: "burnout", value: results.burnout, desc: results.burnoutDesc }
            ];
            
            let hasResults = false;
            tests.forEach(test => {
                if (test.value) {
                    hasResults = true;
                    container.innerHTML += `
                        <div class="result-card">
                            <h3>${test.name}</h3>
                            <p><strong>Результат:</strong> ${test.value}</p>
                            <p><small>${test.desc ? test.desc.substring(0, 150) + '...' : ''}</small></p>
                        </div>
                    `;
                }
            });
            
            if (!hasResults) {
                container.innerHTML = '<div class="no-results">😢 Вы ещё не прошли ни одного теста. Пройдите тесты, чтобы они появились здесь!</div>';
            }
        }
        
        function downloadMyData() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const dataStr = JSON.stringify(user, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${user.name}_results.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️ Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.textContent = '🌓 Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️ Светлая тема';
        }
        
        loadProfile();
    </script>
</body>
</html>
