<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на темперамент</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="mbti.html">MBTI</a>
            <a href="attachment.html">Привязанность</a>
            <a href="temperament.html">Темперамент</a>
            <a href="eq-test.html">EQ</a>
            <a href="burnout-test.html">Выгорание</a>
            <a href="profile.html">📊 Мои результаты</a>
        </nav>
    </header>
    <main>
        <h1>🔥💧🌬️🌍 Тест на темперамент</h1>
        <div id="quiz-area"></div>
        <div id="result-area" class="result-area" style="display: none;"></div>
    </main>
    <footer><p>Учебный проект для колледжа © 2025</p></footer>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Тёмная тема</button>

    <script src="google-sheet.js"></script>
    <script>
        const questions = [
            { text: "Как вы реагируете на неожиданное препятствие?", options: ["Бросаюсь решать", "Ищу обходной путь", "Останавливаюсь и думаю", "Расстраиваюсь"], types: ["choleric", "sanguine", "phlegmatic", "melancholic"] },
            { text: "В компании вы обычно:", options: ["Душа компании", "Спокойный наблюдатель", "Слушаю больше, чем говорю", "Ухожу в себя"], types: ["sanguine", "phlegmatic", "phlegmatic", "melancholic"] },
            { text: "Как вы выполняете работу?", options: ["Быстро и энергично", "Размеренно, но качественно", "Медленно, но тщательно", "Трудно начать"], types: ["choleric", "phlegmatic", "melancholic", "melancholic"] },
            { text: "Ваше настроение чаще всего:", options: ["Приподнятое", "Ровное", "Спокойное", "Переменчивое"], types: ["sanguine", "phlegmatic", "phlegmatic", "melancholic"] },
            { text: "Если вас критикуют, вы:", options: ["Спорю", "Выслушаю и сделаю выводы", "Обижаюсь", "Очень переживаю"], types: ["choleric", "sanguine", "melancholic", "melancholic"] },
            { text: "Как вы принимаете решения?", options: ["Быстро, под влиянием момента", "Взвешенно", "Медленно, но уверенно", "С трудом и сомнениями"], types: ["sanguine", "phlegmatic", "phlegmatic", "melancholic"] },
            { text: "Ваша работоспособность:", options: ["Могу работать долго без усталости", "Равномерная", "Требую частых перерывов", "Быстро устаю"], types: ["choleric", "phlegmatic", "sanguine", "melancholic"] },
            { text: "Как вы переживаете неудачи?", options: ["Легко", "Анализирую", "Долго помню", "Очень тяжело"], types: ["sanguine", "phlegmatic", "melancholic", "melancholic"] },
            { text: "Вы предпочитаете темп жизни:", options: ["Быстрый, активный", "Размеренный", "Спокойный, без спешки", "Тихий, уединённый"], types: ["choleric", "sanguine", "phlegmatic", "melancholic"] }
        ];

        let currentIndex = 0;
        let answers = [];

        const temperamentNames = { choleric: "Холерик", sanguine: "Сангвиник", phlegmatic: "Флегматик", melancholic: "Меланхолик" };
        const temperamentDescriptions = {
            choleric: "Холерик — энергичный, страстный, лидер. Быстро действует, может быть вспыльчив, но отходчив.",
            sanguine: "Сангвиник — жизнерадостный, общительный, оптимист. Легко адаптируется, но может быть поверхностен.",
            phlegmatic: "Флегматик — спокойный, надёжный, уравновешенный. Терпелив, но иногда медлителен.",
            melancholic: "Меланхолик — чувствительный, творческий, ранимый. Глубоко переживает, богатый внутренний мир."
        };

        function renderQuestion() {
            if (currentIndex >= questions.length) {
                showResult();
                return;
            }
            const q = questions[currentIndex];
            let html = `<div class="question-card"><strong>${currentIndex+1}. ${q.text}</strong><div class="options-row">`;
            for (let i = 0; i < q.options.length; i++) {
                html += `<div class="opt-btn" data-type="${q.types[i]}">${q.options[i]}</div>`;
            }
            html += `</div></div>`;
            document.getElementById("quiz-area").innerHTML = html;

            document.querySelectorAll(".opt-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    answers.push(btn.dataset.type);
                    currentIndex++;
                    renderQuestion();
                });
            });
        }

        function showResult() {
            let counts = { choleric: 0, sanguine: 0, phlegmatic: 0, melancholic: 0 };
            for (let type of answers) counts[type]++;
            let maxType = Object.keys(counts).reduce((a,b) => counts[a] > counts[b] ? a : b);
            const resultName = temperamentNames[maxType];
            const resultDesc = temperamentDescriptions[maxType];
            
            localStorage.setItem('lastTemperament', resultName);
            localStorage.setItem('lastTemperamentDesc', resultDesc);
            
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) {
                if (!user.results) user.results = {};
                user.results.temperament = resultName;
                user.results.temperamentDesc = resultDesc;
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                if (typeof sendTestResult === 'function') {
                    sendTestResult(user.name, user.age, user.gender, "Темперамент", resultName, resultDesc);
                }
            }
            
            document.getElementById("quiz-area").style.display = "none";
            document.getElementById("result-area").style.display = "block";
            document.getElementById("result-area").innerHTML = `
                <h2>Ваш тип темперамента: <strong>${resultName}</strong></h2>
                <p>${resultDesc}</p>
                <p><small>✅ Результат сохранён в вашем профиле и отправлен в Google Таблицу.</small></p>
                <button onclick="location.reload()">Пройти заново</button>
                <a href="index.html" class="button" style="margin-left: 1rem;">🏠 На главную</a>
            `;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️ Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.textContent = '🌓 Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️ Светлая тема';
        }

        renderQuestion();
    </script>
</body>
</html>
