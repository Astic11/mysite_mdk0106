<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стиль привязанности</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="mbti.html">MBTI</a>
            <a href="attachment.html">Привязанность</a>
            <a href="temperament.html">Темперамент</a>
            <a href="eq-test.html">EQ</a>
            <a href="burnout-test.html">Выгорание</a>
        </nav>
    </header>
    <main>
        <h1>❤️ Тест на стиль привязанности</h1>
        <div id="quiz-area"></div>
        <div id="result-area" class="result-area" style="display: none;"></div>
    </main>
    <footer><p>Учебный проект для колледжа © 2026</p></footer>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Тёмная тема</button>

    <script>
        const questions = [
            { text: "Мне легко доверять людям и полагаться на них.", scale: 0 },
            { text: "Я часто боюсь, что партнёр меня бросит.", scale: 1 },
            { text: "Мне комфортно без близких отношений, я предпочитаю независимость.", scale: 2 },
            { text: "В отношениях я пугаюсь близости, но и боюсь одиночества.", scale: 3 },
            { text: "Я чувствую, что меня ценят и любят.", scale: 0 },
            { text: "Я постоянно нуждаюсь в подтверждении любви от партнёра.", scale: 1 },
            { text: "Я избегаю говорить о чувствах.", scale: 2 },
            { text: "У меня бывают резкие смены настроения в отношениях.", scale: 3 },
            { text: "Я спокойно переживаю разлуку с близким человеком.", scale: 0 },
            { text: "Я ревную и переживаю, что партнёр может меня обмануть.", scale: 1 },
            { text: "Мне тяжело открываться людям.", scale: 2 },
            { text: "Моё поведение в отношениях непредсказуемо.", scale: 3 }
        ];

        let currentIndex = 0;
        let answers = [];

        const descriptions = {
            "Надёжный": "Надёжный стиль привязанности — это здоровый тип отношений с собой и другими. Вы комфортно чувствуете себя как в близости, так и на расстоянии. Вы умеете доверять, не боитесь быть покинутым, способны просить о поддержке и оказывать её другим. Люди с надёжным стилем обычно имеют устойчивую самооценку и строят долгосрочные гармоничные отношения.",
            "Тревожный": "Тревожный стиль привязанности характеризуется сильным страхом быть отвергнутым или покинутым. Вы часто нуждаетесь в постоянных подтверждениях любви и внимания со стороны партнёра. Может казаться, что вас недостаточно ценят, даже если это не так. Вы склонны к ревности, навязчивым мыслям об отношениях и перепадам настроения.",
            "Избегающий": "Избегающий стиль привязанности проявляется в стремлении к независимости и дистанции в отношениях. Вы предпочитаете полагаться только на себя, избегаете сильной эмоциональной близости и проявления уязвимости. Вас могут считать холодным или отстранённым, но внутри вы просто боитесь, что близость приведёт к потере контроля или боли.",
            "Дезорганизованный": "Дезорганизованный стиль привязанности — самый сложный тип. Вам одновременно хочется близости и страшно её, вы то стремитесь к партнёру, то резко отталкиваете его. Ваше поведение в отношениях может быть непредсказуемым как для других, так и для вас самих. Часто этот стиль формируется в результате травматичного опыта."
        };

        function renderQuestion() {
            if (currentIndex >= questions.length) {
                showResult();
                return;
            }
            const q = questions[currentIndex];
            let html = `<div class="question-card">
                <div class="question-text"><strong>${currentIndex+1}. ${q.text}</strong></div>
                <div>Оцените от 1 (абсолютно не согласен) до 5 (полностью согласен):</div>
                <div class="options-row" id="buttons-row">`;
            for (let i = 1; i <= 5; i++) {
                html += `<div class="opt-btn" data-score="${i}">${i}</div>`;
            }
            html += `</div></div>`;
            document.getElementById("quiz-area").innerHTML = html;

            document.querySelectorAll(".opt-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const score = parseInt(btn.dataset.score);
                    answers.push(score);
                    currentIndex++;
                    renderQuestion();
                });
            });
        }

        function showResult() {
            let sums = [0, 0, 0, 0];
            let counts = [0, 0, 0, 0];
            for (let i = 0; i < questions.length; i++) {
                let scale = questions[i].scale;
                let val = answers[i];
                sums[scale] += val;
                counts[scale]++;
            }
            let averages = sums.map((s, idx) => s / counts[idx]);
            let maxIndex = 0;
            for (let i = 1; i < averages.length; i++) {
                if (averages[i] > averages[maxIndex]) maxIndex = i;
            }
            const styleNames = ["Надёжный", "Тревожный", "Избегающий", "Дезорганизованный"];
            const resultStyle = styleNames[maxIndex];
            const resultDesc = descriptions[resultStyle];

            // Сохраняем результат в localStorage
            localStorage.setItem('lastAttachment', resultStyle);
            localStorage.setItem('lastAttachmentDesc', resultDesc);

            document.getElementById("quiz-area").style.display = "none";
            document.getElementById("result-area").style.display = "block";
            document.getElementById("result-area").innerHTML = `
                <h2>Ваш стиль привязанности: <strong>${resultStyle}</strong></h2>
                <p>${resultDesc}</p>
                <p><small>✅ Результат сохранён. Вы увидите его на главной странице.</small></p>
                <button onclick="location.reload()">Пройти заново</button>
            `;
        }

        // Тёмная тема
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️ Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.textContent = '🌓 Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️ Светлая тема';
        }

        renderQuestion();
    </script>
</body>
</html>
