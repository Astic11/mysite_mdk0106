<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стиль привязанности</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="mbti.html">MBTI</a>
            <a href="attachment.html">Привязанность</a>
            <a href="temperament.html">Темперамент</a>
            <a href="eq-test.html">EQ</a>
            <a href="burnout-test.html">Выгорание</a>
            <a href="profile.html">📊 Мои результаты</a>
        </nav>
    </header>
    <main>
        <h1>❤️ Тест на стиль привязанности</h1>
        <div id="quiz-area"></div>
        <div id="result-area" class="result-area" style="display: none;"></div>
    </main>
    <footer><p>Учебный проект для колледжа © 2025</p></footer>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Тёмная тема</button>

    <script src="google-sheet.js"></script>
    <script>
        const questions = [
            { text: "Мне легко доверять людям и полагаться на них.", scale: 0 },
            { text: "Я часто боюсь, что партнёр меня бросит.", scale: 1 },
            { text: "Мне комфортно без близких отношений, я предпочитаю независимость.", scale: 2 },
            { text: "В отношениях я пугаюсь близости, но и боюсь одиночества.", scale: 3 },
            { text: "Я чувствую, что меня ценят и любят.", scale: 0 },
            { text: "Я постоянно нуждаюсь в подтверждении любви от партнёра.", scale: 1 },
            { text: "Я избегаю говорить о чувствах.", scale: 2 },
            { text: "У меня бывают резкие смены настроения в отношениях.", scale: 3 },
            { text: "Я спокойно переживаю разлуку с близким человеком.", scale: 0 },
            { text: "Я ревную и переживаю, что партнёр может меня обмануть.", scale: 1 },
            { text: "Мне тяжело открываться людям.", scale: 2 },
            { text: "Моё поведение в отношениях непредсказуемо.", scale: 3 }
        ];

        let currentIndex = 0;
        let answers = [];

        const descriptions = {
            "Надёжный": "Надёжный стиль привязанности — здоровый тип отношений. Вы комфортно чувствуете себя в близости и на расстоянии, умеете доверять и строить гармоничные отношения.",
            "Тревожный": "Тревожный стиль — вы часто боитесь быть отвергнутым, нуждаетесь в постоянных подтверждениях любви. Работа над самооценкой поможет вам чувствовать себя увереннее.",
            "Избегающий": "Избегающий стиль — вы предпочитаете независимость и дистанцию, боитесь сильной близости. Постепенное открытие людям улучшит качество отношений.",
            "Дезорганизованный": "Дезорганизованный стиль — вам одновременно хочется близости и страшно её. Рекомендуется поддержка психолога для выстраивания стабильных отношений."
        };

        function renderQuestion() {
            if (currentIndex >= questions.length) {
                showResult();
                return;
            }
            const q = questions[currentIndex];
            let html = `<div class="question-card">
                <strong>${currentIndex+1}. ${q.text}</strong>
                <div>Оцените от 1 (не согласен) до 5 (согласен):</div>
                <div class="options-row">`;
            for (let i = 1; i <= 5; i++) {
                html += `<div class="opt-btn" data-score="${i}">${i}</div>`;
            }
            html += `</div></div>`;
            document.getElementById("quiz-area").innerHTML = html;

            document.querySelectorAll(".opt-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    answers.push(parseInt(btn.dataset.score));
                    currentIndex++;
                    renderQuestion();
                });
            });
        }

        function showResult() {
            let sums = [0,0,0,0], counts = [0,0,0,0];
            for (let i = 0; i < questions.length; i++) {
                sums[questions[i].scale] += answers[i];
                counts[questions[i].scale]++;
            }
            let averages = sums.map((s,i) => s/counts[i]);
            let maxIndex = averages.indexOf(Math.max(...averages));
            const styleNames = ["Надёжный", "Тревожный", "Избегающий", "Дезорганизованный"];
            const resultStyle = styleNames[maxIndex];
            const resultDesc = descriptions[resultStyle];
            
            localStorage.setItem('lastAttachment', resultStyle);
            localStorage.setItem('lastAttachmentDesc', resultDesc);
            
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) {
                if (!user.results) user.results = {};
                user.results.attachment = resultStyle;
                user.results.attachmentDesc = resultDesc;
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                if (typeof sendTestResult === 'function') {
                    sendTestResult(user.name, user.age, user.gender, "Стиль привязанности", resultStyle, resultDesc);
                }
            }
            
            document.getElementById("quiz-area").style.display = "none";
            document.getElementById("result-area").style.display = "block";
            document.getElementById("result-area").innerHTML = `
                <h2>Ваш стиль привязанности: <strong>${resultStyle}</strong></h2>
                <p>${resultDesc}</p>
                <p><small>✅ Результат сохранён в вашем профиле и отправлен в Google Таблицу.</small></p>
                <button onclick="location.reload()">Пройти заново</button>
                <a href="index.html" class="button" style="margin-left: 1rem;">🏠 На главную</a>
            `;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️ Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.textContent = '🌓 Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️ Светлая тема';
        }

        renderQuestion();
    </script>
</body>
</html>
